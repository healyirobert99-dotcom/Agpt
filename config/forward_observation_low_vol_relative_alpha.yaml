# forward_observation_low_vol_relative_alpha.yaml
# Relative alpha forward observation for low-vol candidate.
# STATUS: relative_factor_watch_only
# OBSERVATION ONLY. No trading, no orders, no broker.
# Focus: excess_return_vs_CSI800 (NOT absolute return)

sqlite_path: stock-data/ashare_research.sqlite3

trading_allowed: false
order_generation_allowed: false
broker_connection_allowed: false

candidate:
  candidate_id: relative_low_vol_5d
  formula: NEG(RET_STD20)
  rebalance_frequency: 5
  stock_pool: CSI800_asof
  top_n: 20
  weighting: equal_weight
  status: relative_factor_watch_only
  absolute_return_strategy: false
  relative_alpha_factor: true

observation:
  primary_metric: excess_return_vs_CSI800
  metric_priority:
    - excess_return_vs_CSI800
    - rolling_5d_excess
    - rolling_20d_excess
    - relative_drawdown
    - turnover
    - absolute_return
  benchmark: CSI800_index_daily_000906_sh
  evaluation_rules:
    - "absolute_return_negative_but_excess_positive: record as relative_outperform"
    - "absolute_return_positive_but_excess_negative: record as relative_underperform"
    - "do_not_judge_factor_by_absolute_return_alone"

output:
  json_dir: research_intel/forward_observation/low_vol_relative_alpha
  md_dir: research_intel/forward_observation/low_vol_relative_alpha
